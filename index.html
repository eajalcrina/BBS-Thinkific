    <!-- ═══ Structured Data — FAQPage (sincronizado con src/components/FAQ.jsx) ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "@id": "https://biobusinessschool.org/#faq",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es un Bio/Builder?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un Bio/Builder es un líder híbrido que domina simultáneamente la ciencia, la tecnología y las finanzas de impacto. Es el perfil que América Latina necesita para convertir su biodiversidad en bionegocios rentables. A diferencia de un MBA tradicional, el Bio/Builder diseña modelos económicos que regeneran territorio en lugar de extraer valor."
          }
        },
        {
          "@type": "Question",
          "name": "¿En qué se diferencia Bio Business School de un MBA tradicional?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Los MBA clásicos maximizan retorno financiero a corto plazo sin entender biología molecular ni territorio, lo que ha llevado a décadas de capital en fuga desde la región. BBS forma un perfil inverso: gente que entiende ciencia de frontera, finanzas de impacto y gobernanza de origen, y que diseña empresas rentables que protegen la biodiversidad."
          }
        },
        {
          "@type": "Question",
          "name": "¿Necesito tener formación científica para unirme?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Nuestros programas están diseñados para perfiles híbridos: científicos sin formación en negocios, ejecutivos sin formación científica, emprendedores en etapa cero y profesionales de cualquier disciplina interesados en biotecnología e impacto regional."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuándo comienza el primer programa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La primera cohorte del Biotech Sprint 01 arranca en el segundo trimestre de 2026 (Q2 2026). Las inscripciones Early Bird están abiertas con precio especial de lanzamiento de $40 USD."
          }
        },
        {
          "@type": "Question",
          "name": "¿Los programas son online o presenciales?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El Biotech Sprint 01 es 100% online con sesiones en vivo semanales de 90 minutos y material asincrónico que puedes consumir a tu ritmo. Operamos desde Lima, Perú, con alcance en toda América Latina."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué incluye la membresía gratis de Emprendedores?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Acceso al grupo privado de WhatsApp, herramientas y frameworks para vender desde el primer día, recursos curados sobre bionegocios, y prioridad de acceso a eventos y lanzamientos futuros. No cuesta nada y no pedimos tarjeta."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo acceder al Bio Business Playbook sin inscribirme al curso?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. El Playbook Vol. 1 — Design está disponible en versión digital ($25 USD) y versión impresa bajo demanda. Es el libro donde Eddie Ajalcriña y Lorenzo Ortiz desglosan la ingeniería de bionegocios para dominar el mercado global desde la biodiversidad de la región."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo contacto al equipo para una asesoría empresarial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Si eres empresario y quieres soporte personalizado para escalar tu bionegocio, puedes escribirnos directo por WhatsApp desde la sección Comunidad, o contactarnos a biobusiness@redesignlab.org."
          }
        }
      ]
    }
    </script>
