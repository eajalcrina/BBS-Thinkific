      const isT8=top8ns.includes(b.c);const ni=top8ns.indexOf(b.c);
      const zf=isT8?"TOP 8":b.ns.z;
      return`<div class="card" style="${isT8?"border-left:3px solid #F32769":""}"><div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px"><div><span style="font-weight:600;font-size:15px;color:${isT8?"#C1F400":"#f0f0f0"}">${b.c} ${b.n}</span> <span class="zp ${zCls(zf)}">${isT8?"TOP 8 #"+(ni+1):zf}</span></div><div style="font-size:12px;color:#888">${b.bud}</div></div><div style="font-size:13px;color:#888;margin-top:6px">${b.r} · ${b.cd} · ${b.p} · Socios: ${b.s||"N/D"}</div><div style="font-size:13px;color:#ccc;margin-top:8px">${b.inn}</div><div style="font-size:12px;color:#666;margin-top:8px">Ventas: ${b.ven} · v1: #${b.v5.p||"—"} (${b.v5.s||"—"}) · v2: ${b.v7.p?"#"+b.v7.p+" ("+b.v7.s+")":"Eliminado"}</div><div style="font-size:12px;color:#F32769;margin-top:4px">${b.imp}</div></div>`;
    }).join("");
  };
  renderList("");
  document.getElementById("bioFilter").addEventListener("input",e=>renderList(e.target.value));
}

function renderDistribution(el){
  el.innerHTML=`<div class="section-title">Análisis del top 8 por distribución</div>
  <div class="kpi-grid kpi-grid-3">
    <div class="kpi"><div class="n">5/6</div><div class="l">Regiones cubiertas</div></div>
    <div class="kpi"><div class="n">4</div><div class="l">Cadenas de valor</div></div>
    <div class="kpi"><div class="n">~USD 45K</div><div class="l">Inversión estimada</div></div>
  </div>
  <div class="dist-grid">
    <div class="chart-wrap"><h3>Top 8 por región</h3><div style="position:relative;height:280px"><canvas id="regC"></canvas></div></div>
    <div class="chart-wrap"><h3>Top 8 por cadena de valor</h3><div style="position:relative;height:280px"><canvas id="cadC"></canvas></div></div>
  </div>
  <div class="dist-grid" style="margin-top:20px">
    <div class="chart-wrap"><h3>Portafolio completo: 25 bionegocios por región</h3><div style="position:relative;height:260px"><canvas id="allRegC"></canvas></div></div>
    <div class="chart-wrap"><h3>Zona final de los 25 bionegocios</h3><div style="position:relative;height:260px"><canvas id="zonaC"></canvas></div></div>
  </div>`;
  const rc={},cc={};
  top8ns.forEach(c=>{const b=B.find(x=>x.c===c);rc[b.r]=(rc[b.r]||0)+1;cc[b.cd]=(cc[b.cd]||0)+1;});
  const allR=["Loreto","Amazonas","San Martín","Junín","Madre de Dios","Ucayali"];
  charts.reg=new Chart(document.getElementById("regC"),{type:"bar",data:{labels:allR,datasets:[{data:allR.map(r=>rc[r]||0),backgroundColor:allR.map(r=>rc[r]?"#F32769":"#333")}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",scales:{x:{beginAtZero:true,ticks:{stepSize:1,color:"#666"},grid:{color:"rgba(255,255,255,0.05)"}},y:{ticks:{color:"#ccc"},grid:{display:false}}},plugins:{legend:{display:false}}}});
  const cL=Object.keys(cc),cV=Object.values(cc),cC=["#F32769","#C1F400","#85B7EB","#EF9F27","#ED93B1"];
  charts.cad=new Chart(document.getElementById("cadC"),{type:"doughnut",data:{labels:cL,datasets:[{data:cV,backgroundColor:cC.slice(0,cL.length),borderColor:"#101010",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{display:true,position:"bottom",labels:{color:"#888",font:{size:11,family:"Barlow"},padding:8}}}}});
  const arc={};B.forEach(b=>arc[b.r]=(arc[b.r]||0)+1);
  charts.allReg=new Chart(document.getElementById("allRegC"),{type:"bar",data:{labels:allR,datasets:[{label:"Total portafolio",data:allR.map(r=>arc[r]||0),backgroundColor:"#333"},{label:"Top 8 NESsT",data:allR.map(r=>rc[r]||0),backgroundColor:"#F32769"}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:"#888"},grid:{display:false}},y:{beginAtZero:true,ticks:{stepSize:1,color:"#666"},grid:{color:"rgba(255,255,255,0.05)"}}},plugins:{legend:{display:true,position:"top",labels:{color:"#888",font:{size:11,family:"Barlow"}}}}}});
  const zc={};B.forEach(b=>{const ni=top8ns.indexOf(b.c);const zf=ni>=0?"TOP 8":b.ns.z;zc[zf]=(zc[zf]||0)+1;});
  const zL=["TOP 8","ELIMINADO","EXCLUIDO"],zV=zL.map(z=>zc[z]||0);
  charts.zona=new Chart(document.getElementById("zonaC"),{type:"doughnut",data:{labels:zL.map((z,i)=>`${z} (${zV[i]})`),datasets:[{data:zV,backgroundColor:["#6fcf6f","#666","#444"],borderColor:"#101010",borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:"55%",plugins:{legend:{display:true,position:"bottom",labels:{color:"#888",font:{size:11,family:"Barlow"},padding:8}}}}});
}

renderTabs();render();
</script>
</body>
